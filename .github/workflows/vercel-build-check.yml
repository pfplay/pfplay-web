name: vercel build check

on:
  pull_request:
    branches: [development, main]

jobs:
  build:
    name: vercel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel build --yes
